<script>
        // Live search filtering for Popular Tools grid
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('globalToolSearch');
            const toolCards = document.querySelectorAll('.popular-tools .tool-card');

            if (searchInput && toolCards.length > 0 && window.OnlinePDFPro && window.OnlinePDFPro.Utils) {
                searchInput.addEventListener('input', OnlinePDFPro.Utils.debounce((e) => {
                    const query = e.target.value.toLowerCase().trim();
                    toolCards.forEach(card => {
                        const nameEl = card.querySelector('.tool-name');
                        const descEl = card.querySelector('.tool-desc');
                        if (nameEl) {
                            const name = nameEl.textContent.toLowerCase();
                            const desc = descEl ? descEl.textContent.toLowerCase() : '';
                            const matchesQuery = name.includes(query) || desc.includes(query);
                            card.style.display = matchesQuery ? 'flex' : 'none';
                        }
                    });
                }, 200));
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

<!-- Homepage Smart Drop & Recent Tools -->
<script>
(function() {
    // === RECENT TOOLS ("Jump Back In") ===
    var recentSection = document.getElementById('recentToolsSection');
    if (recentSection) {
        try {
            var recent = JSON.parse(localStorage.getItem('doctools-recent')) || [];
            if (recent.length > 0) {
                var items = recent.slice(0, 3);
                recentSection.style.display = 'block';
                recentSection.innerHTML =
                    '<div class="hp-section-head" style="margin-top:30px;margin-bottom:16px;">' +
                    '<h2><span class="hp-section-head-icon" style="background:rgba(99,102,241,0.3);">' +
                    '<svg fill="none" height="16" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>' +
                    '</span>Jump Back In</h2>' +
                    '<div class="hp-section-head-line"></div></div>' +
                    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">' +
                    items.map(function(r) {
                        return '<a href="tools/' + r.id + '.html" style="padding:12px 20px;background:var(--surface-1,#16161a);border:1.5px solid var(--border,#26262b);border-radius:14px;text-decoration:none;color:var(--text-primary,#f3f4f6);font-size:14px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;" onmouseenter="this.style.borderColor=\'var(--accent,#6366f1)\';this.style.transform=\'translateY(-2px)\'" onmouseleave="this.style.borderColor=\'var(--border,#26262b)\';this.style.transform=\'none\'">' +
                        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>' +
                        r.name + '</a>';
                    }).join('') +
                    '</div>';
            }
        } catch(e) {}
    }

    // === HOMEPAGE SMART DROP ZONE ===
    var overlay = document.getElementById('homeDropOverlay');
    var modal = document.getElementById('homeDropModal');
    if (!overlay || !modal) return;

    var dragCounter = 0;

    var toolMap = {
        pdf: [
            { name: 'Compress', icon: '📦', href: 'tools/compress-pdf.html' },
            { name: 'Merge', icon: '📄', href: 'tools/merge-pdf.html' },
            { name: 'Split', icon: '✂️', href: 'tools/split-pdf.html' },
            { name: 'Read', icon: '📖', href: 'pdf-reader.html' },
            { name: 'Protect', icon: '🔒', href: 'tools/password-protect-pdf.html' },
            { name: 'Sign', icon: '✍️', href: 'tools/sign-pdf.html' },
            { name: 'Watermark', icon: '💧', href: 'tools/pdf-watermark.html' },
            { name: 'Rotate', icon: '🔄', href: 'tools/rotate-pdf.html' }
        ],
        image: [
            { name: 'Compress', icon: '📦', href: 'tools/image-compressor.html' },
            { name: 'Resize', icon: '↔️', href: 'tools/image-resize.html' },
            { name: 'Crop', icon: '✂️', href: 'tools/image-crop.html' },
            { name: 'Convert', icon: '🔄', href: 'tools/image-format-converter.html' },
            { name: 'To PDF', icon: '📄', href: 'tools/jpg-to-pdf.html' },
            { name: 'Extract Text', icon: '📝', href: 'tools/image-to-text.html' }
        ]
    };

    document.addEventListener('dragenter', function(e) {
        e.preventDefault();
        dragCounter++;
        overlay.style.opacity = '1';
        overlay.style.visibility = 'visible';
        overlay.style.pointerEvents = 'auto';
    });

    document.addEventListener('dragleave', function(e) {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
            dragCounter = 0;
            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';
            overlay.style.pointerEvents = 'none';
        }
    });

    document.addEventListener('dragover', function(e) { e.preventDefault(); });

    overlay.addEventListener('drop', function(e) {
        e.preventDefault();
        dragCounter = 0;
        overlay.style.opacity = '0';
        overlay.style.visibility = 'hidden';
        overlay.style.pointerEvents = 'none';

        var files = e.dataTransfer.files;
        if (!files || files.length === 0) return;

        var file = files[0];
        var isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
        var isImage = file.type.startsWith('image/');

        var tools = isPDF ? toolMap.pdf : (isImage ? toolMap.image : toolMap.pdf);

        document.getElementById('dropModalFileName').textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)';

        var actionsDiv = document.getElementById('dropModalActions');
        actionsDiv.innerHTML = tools.map(function(t) {
            return '<a href="' + t.href + '" style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface-2,#1c1c21);border:1.5px solid var(--border,#26262b);border-radius:12px;text-decoration:none;color:var(--text-primary,#f3f4f6);font-weight:600;font-size:0.9rem;transition:all 0.2s;" onmouseenter="this.style.borderColor=\'#6366f1\';this.style.transform=\'translateY(-2px)\'" onmouseleave="this.style.borderColor=\'var(--border,#26262b)\';this.style.transform=\'none\'">' +
            '<span style="font-size:1.3rem;">' + t.icon + '</span>' + t.name + '</a>';
        }).join('');

        modal.style.display = 'flex';
    });

    // Close modal on background click
    modal.addEventListener('click', function(e) {
        if (e.target === modal) modal.style.display = 'none';
    });
})();
</script>
