    <style>
        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 20px;
        }

        body {
            color: var(--text-primary) !important;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin: 28px auto;
            max-width: 1180px;
            height: 70vh;
            min-height: 500px;
        }

        .sidebar {
            background: var(--surface-1);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 18px;
            color: var(--text-primary);
        }

        .btn-new-note {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: transform 0.2s;
        }

        .btn-new-note:hover {
            transform: translateY(-1px);
        }

        .notes-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .note-item {
            padding: 12px;
            border-radius: 10px;
            background: var(--surface-2);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note-item:hover {
            border-color: var(--border);
            background: var(--surface-hover, rgba(0,0,0,0.02));
        }

        .note-item.active {
            border-color: var(--accent);
            background: rgba(37, 99, 235, 0.05);
        }

        .note-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        .note-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            opacity: 0.5;
            transition: opacity 0.2s, color 0.2s;
        }

        .note-item:hover .btn-delete {
            opacity: 1;
        }

        .btn-delete:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .editor-area {
            background: var(--surface-1);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .editor-title-input {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            max-width: 600px;
        }

        .editor-title-input:focus {
            border-bottom: 2px solid var(--accent);
        }

        .textarea {
            width: 100%;
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .status-bar {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 900px) {
            .workspace-grid {
                grid-template-columns: 1fr;
                height: auto;
            }
            .sidebar {
                max-height: 250px;
            }
            .editor-area {
                height: 500px;
            }
        }

    <main id="main" class="tool-page">

<div class="container">
            <div class="tool-header" style="text-align:center; margin-bottom:20px;">
                <span class="section-tag"
                    style="display:inline-block; padding:6px 18px; background:rgba(37,99,235,0.08); color:var(--accent); border-radius:50px; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;">Productivity</span>
                <h1 class="tool-title"
                    style="font-size:2.5rem; font-weight:800; color:var(--text-primary); margin:0 0 12px; line-height:1.2;">PDF Scratchpad</h1>
                <p class="tool-description"
                    style="color:var(--text-secondary); font-size:1rem; max-width:740px; margin:0 auto; line-height:1.6;">An offline-capable notepad for your browser. Perfect for drafting content or pasting text extracted from PDFs. Everything auto-saves locally on your device.</p>
            </div>

            <div class="workspace-grid">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3>Your Notes</h3>
                        <button class="btn-new-note" id="newNoteBtn">+ New</button>
                    </div>
                    <ul class="notes-list" id="notesList">
                        <!-- Notes will be injected here -->
                    </ul>
                </aside>

                <section class="editor-area">
                    <div class="editor-header">
                        <input type="text" class="editor-title-input" id="noteTitle" placeholder="Note Title...">
                        <button class="btn-new-note" id="downloadBtn" style="background: linear-gradient(135deg, #10b981, #059669);">⬇ Download TXT</button>
                    </div>
                    <textarea class="textarea" id="noteContent" placeholder="Start typing here..."></textarea>
                    <div class="status-bar">
                        <span id="saveStatus">Saved</span>
                        <span><span id="wordCount">0</span> words | <span id="charCount">0</span> chars</span>
                    </div>
                </section>
            </div>
        </div>

</main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const notesList = document.getElementById('notesList');
            const noteTitleInput = document.getElementById('noteTitle');
            const noteContentInput = document.getElementById('noteContent');
            const newNoteBtn = document.getElementById('newNoteBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const saveStatus = document.getElementById('saveStatus');
            const wordCountSpan = document.getElementById('wordCount');
            const charCountSpan = document.getElementById('charCount');

            let notes = JSON.parse(localStorage.getItem('pdf_scratchpad_notes')) || [];
            let activeNoteId = null;
            let saveTimeout = null;

            // Initialize
            if (notes.length === 0) {
                createNewNote();
            } else {
                renderNotesList();
                setActiveNote(notes[0].id);
            }

            // Event Listeners
            newNoteBtn.addEventListener('click', createNewNote);
            
            noteTitleInput.addEventListener('input', () => {
                triggerSave();
                updateActiveNoteInList();
            });

            noteContentInput.addEventListener('input', () => {
                triggerSave();
                updateCounts();
            });

            downloadBtn.addEventListener('click', () => {
                const activeNote = notes.find(n => n.id === activeNoteId);
                if (!activeNote) return;
                
                const blob = new Blob([activeNote.content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (activeNote.title || 'Untitled_Note').replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substring(2);
            }

            function createNewNote() {
                const newNote = {
                    id: generateId(),
                    title: 'Untitled Note',
                    content: '',
                    updatedAt: new Date().toISOString()
                };
                notes.unshift(newNote); // Add to beginning
                saveToLocalStorage();
                renderNotesList();
                setActiveNote(newNote.id);
            }

            function deleteNote(id, event) {
                event.stopPropagation();
                notes = notes.filter(n => n.id !== id);
                saveToLocalStorage();
                
                if (notes.length === 0) {
                    createNewNote();
                } else if (activeNoteId === id) {
                    setActiveNote(notes[0].id);
                } else {
                    renderNotesList();
                }
            }

            function setActiveNote(id) {
                activeNoteId = id;
                const note = notes.find(n => n.id === id);
                if (note) {
                    noteTitleInput.value = note.title;
                    noteContentInput.value = note.content;
                    updateCounts();
                    renderNotesList(); // Update active class
                }
            }

            function triggerSave() {
                saveStatus.textContent = 'Saving...';
                saveStatus.style.color = '#eab308'; // yellow
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(saveActiveNote, 500);
            }

            function saveActiveNote() {
                if (!activeNoteId) return;
                
                const noteIndex = notes.findIndex(n => n.id === activeNoteId);
                if (noteIndex > -1) {
                    notes[noteIndex].title = noteTitleInput.value;
                    notes[noteIndex].content = noteContentInput.value;
                    notes[noteIndex].updatedAt = new Date().toISOString();
                    
                    // Move to top if updated
                    const updatedNote = notes.splice(noteIndex, 1)[0];
                    notes.unshift(updatedNote);
                    
                    saveToLocalStorage();
                    renderNotesList();
                    
                    saveStatus.textContent = 'Saved';
                    saveStatus.style.color = '#10b981'; // green
                }
            }

            function saveToLocalStorage() {
                localStorage.setItem('pdf_scratchpad_notes', JSON.stringify(notes));
            }

            function formatDate(isoString) {
                const date = new Date(isoString);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }

            function renderNotesList() {
                notesList.innerHTML = '';
                notes.forEach(note => {
                    const li = document.createElement('li');
                    li.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
                    li.onclick = () => setActiveNote(note.id);
                    
                    li.innerHTML = `
                        <div>
                            <div class="note-title" title="${escapeHtml(note.title || 'Untitled Note')}">
                                ${escapeHtml(note.title || 'Untitled Note')}
                            </div>
                            <span class="note-date">${formatDate(note.updatedAt)}</span>
                        </div>
                        <button class="btn-delete" title="Delete Note">✖</button>
                    `;
                    
                    const deleteBtn = li.querySelector('.btn-delete');
                    deleteBtn.onclick = (e) => deleteNote(note.id, e);
                    
                    notesList.appendChild(li);
                });
            }

            function updateActiveNoteInList() {
                const activeLi = notesList.querySelector('.note-item.active .note-title');
                if (activeLi) {
                    activeLi.textContent = noteTitleInput.value || 'Untitled Note';
                }
            }

            function updateCounts() {
                const text = noteContentInput.value || '';
                const words = text.match(/[a-zA-Z0-9'-]+/g);
                wordCountSpan.textContent = words ? words.length : 0;
                charCountSpan.textContent = text.length;
            }

            function escapeHtml(unsafe) {
                return (unsafe || '').toString()
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        });
    </script>
    <script defer src="js/app.js?v=11"></script>
</body>
