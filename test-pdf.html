<!DOCTYPE html>
<html>

<head>
    <title>HTML to PDF Test</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Include html2pdf.bundle.min.js the same way we do in the main app -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

        <script defer src="js/third-party-loader.js"></script>
    <!-- Security & Anti-Hacking Script -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 73) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 74) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 67) { return false; }
            if(e.ctrlKey && e.keyCode == 85) { return false; }
        };
        setInterval(function() {
            var before = new Date().getTime();
            debugger;
            var after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = "<div style='display:flex;height:100vh;align-items:center;justify-content:center;background:#000;color:red;font-family:monospace;font-size:24px;'>Access Denied.</div>";
            }
        }, 1000);
    </script>

</head>

<body>
    <h1>PDF Test Page</h1>
    <textarea id="code" style="width:100%; height:200px;"><h1>Hello World</h1><p>Test</p></textarea>
    <button onclick="downloadPDF()">Generate PDF</button>
    <button onclick="downloadPDF2()">Generate PDF (Method 2)</button>

    <div id="target" style="border: 1px solid red; margin-top:20px;">
        Will render here.
    </div>

    <script>
        function downloadPDF() {
            var html = document.getElementById('code').value;
            var target = document.getElementById('target');
            target.innerHTML = html;

            var opt = {
                margin: 10,
                filename: 'myfile.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' }
            };

            // Promise-based usage:
            html2pdf().set(opt).from(target).save();
        }

        function downloadPDF2() {
            var html = document.getElementById('code').value;
            // Trying html string directly again, just to see what happens in a pure isolated env.
            html2pdf().from(html).save();
        }
    </script>
</body>

</html>
